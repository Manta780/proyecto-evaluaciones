<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizAI - Plataforma de Evaluación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-indigo-600 text-white p-4" id="navbar">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">QuizAI</h1>
            <div id="nav-links">
                <button onclick="showLogin()" class="mr-4 hover:underline">Iniciar Sesión</button>
                <button onclick="showRegister()" class="hover:underline">Registrarse</button>
            </div>
        </div>
    </nav>

    <!-- Logger Panel -->
    <div id="logger-panel" class="fixed bottom-0 right-0 w-80 bg-gray-900 text-green-400 p-4 max-h-64 overflow-y-auto font-mono text-sm hidden">
        <div class="flex justify-between items-center mb-2 border-b border-gray-700 pb-2">
            <span class="font-bold text-white">Logger</span>
            <button onclick="toggleLogger()" class="text-gray-400 hover:text-white">&times;</button>
        </div>
        <div id="logger-content"></div>
    </div>
    <button onclick="toggleLogger()" id="logger-toggle" class="fixed bottom-4 right-4 bg-gray-800 text-white p-2 rounded-full shadow-lg hidden">
        📋
    </button>

    <!-- Main Container -->
    <div class="container mx-auto mt-8 p-4">
        <!-- Auth Forms -->
        <div id="auth-container" class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
            <!-- Login Form -->
            <div id="login-form">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Iniciar Sesión</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Correo Electrónico</label>
                        <input type="email" id="login-email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
                        <input type="password" id="login-password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">Iniciar Sesión</button>
                </form>
                <p class="mt-4 text-center text-gray-600">
                    ¿No tienes cuenta? <button onclick="showRegister()" class="text-indigo-600 hover:underline">Regístrate</button>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Crear Cuenta</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Nombre Completo</label>
                        <input type="text" id="register-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Correo Electrónico</label>
                        <input type="email" id="register-email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Contraseña</label>
                        <input type="password" id="register-password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Rol</label>
                        <select id="register-role" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <option value="estudiante">Estudiante</option>
                            <option value="Docente">Docente</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">Crear Cuenta</button>
                </form>
                <p class="mt-4 text-center text-gray-600">
                    ¿Ya tienes cuenta? <button onclick="showLogin()" class="text-indigo-600 hover:underline">Inicia Sesión</button>
                </p>
            </div>
        </div>

        <!-- Dashboard Estudiante -->
        <div id="student-dashboard" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Bienvenido, Estudiante</h2>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-semibold mb-4">Ingresa el código del Quiz</h3>
                <div class="flex gap-4">
                    <input type="text" id="quiz-code-input" placeholder="Código de 6 dígitos" maxlength="6" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    <button onclick="accessQuiz()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Acceder</button>
                </div>
            </div>
        </div>

        <!-- Dashboard Docente -->
        <div id="teacher-dashboard" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Panel de Docente</h2>

            <!-- Create Quiz Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h3 class="text-xl font-semibold mb-4">Crear Nuevo Quiz</h3>
                <form onsubmit="handleCreateQuiz(event)" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Título del Quiz</label>
                        <input type="text" id="quiz-title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="Ej: Evaluación de Historia">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Descripción</label>
                        <textarea id="quiz-description" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" rows="3" placeholder="Describe cómo quieres el quiz..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Documento (PDF, DOCX, PPTX, Imagen)</label>
                        <input type="file" id="quiz-file" accept=".pdf,.docx,.pptx,.png,.jpg,.jpeg" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Cantidad de Preguntas</label>
                            <input type="number" id="quiz-amount" min="1" max="50" value="5" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Dificultad</label>
                            <select id="quiz-difficulty" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                                <option value="Recordación">Recordación</option>
                                <option value="Comprensión" selected>Comprensión</option>
                                <option value="Aplicación">Aplicación</option>
                                <option value="Análisis">Análisis</option>
                                <option value="Evaluación">Evaluación</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Tipo de Preguntas</label>
                        <select id="quiz-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <option value="opción múltiple">Opción Múltiple</option>
                            <option value="verdadero/falso">Verdadero/Falso</option>
                            <option value="respuesta corta">Respuesta Corta</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Modo de Limpieza IA</label>
                        <select id="quiz-cleaning-mode" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                            <option value="básica">Básica</option>
                            <option value="completa" selected>Completa</option>
                        </select>
                    </div>
                    <button type="submit" id="create-quiz-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">Generar Quiz con IA</button>
                </form>
            </div>

            <!-- Loading Indicator -->
            <div id="quiz-loading" class="hidden bg-white rounded-lg shadow-md p-6 mb-6 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
                <p class="mt-4 text-gray-600">Generando quiz con IA...</p>
                <p class="text-sm text-gray-500">Esto puede tomar unos segundos</p>
            </div>

            <!-- Quiz Result -->
            <div id="quiz-result" class="hidden">
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4">
                    <p class="font-bold">¡Quiz creado exitosamente!</p>
                    <p>Comparte el código: <span id="quiz-access-code" class="font-mono text-lg font-bold"></span></p>
                </div>

                <!-- Quiz Display -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 id="result-title" class="text-2xl font-bold text-gray-800"></h3>
                            <p id="result-description" class="text-gray-600 mt-2"></p>
                        </div>
                        <button onclick="copyQuizCode()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg text-gray-700">📋 Copiar Código</button>
                    </div>

                    <div id="questions-container" class="space-y-6">
                        <!-- Questions will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
